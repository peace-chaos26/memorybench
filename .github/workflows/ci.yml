name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check memorybench/ tests/
        continue-on-error: true   # don't block CI on style issues

      - name: Type check (mypy)
        run: mypy memorybench/
        continue-on-error: true   # informational for now; harden in Week 4

      - name: Run unit tests
        run: pytest tests/ -v --cov=memorybench --cov-report=xml
        env:
          # Unit tests don't need real API keys — they're mocked or skipped
          OPENAI_API_KEY: "sk-test-placeholder"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true